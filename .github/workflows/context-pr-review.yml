name: ReviewIQ

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  context-review:
    name: ReviewIQ
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pull request
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate PR diff
        run: |
          BASE_REF="${{ github.base_ref }}"
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          git fetch origin "${BASE_REF}" --no-tags --prune

          BASE_COMMIT="${BASE_SHA:-origin/${BASE_REF}}"
          HEAD_COMMIT="${HEAD_SHA:-HEAD}"

          if git merge-base "${BASE_COMMIT}" "${HEAD_COMMIT}" >/dev/null 2>&1; then
            git diff --unified=80 "${BASE_COMMIT}...${HEAD_COMMIT}" > pr.diff
          else
            echo "No merge base found between ${BASE_COMMIT} and ${HEAD_COMMIT}; using direct tree diff."
            git diff --unified=80 "${BASE_COMMIT}" "${HEAD_COMMIT}" > pr.diff
          fi

      - name: Run context reviewer
        env:
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          JIRA_BASE_URL: ${{ vars.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_BEARER_TOKEN: ${{ secrets.JIRA_BEARER_TOKEN }}
          JIRA_AC_FIELD: ${{ vars.JIRA_AC_FIELD }}
          JIRA_API_VERSION: ${{ vars.JIRA_API_VERSION || '3' }}
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          LITELLM_BASE_URL: ${{ secrets.LITELLM_BASE_URL || 'https://llmgw.codefest2026.marriott.com/' }}
          LITELLM_API_PATH: ${{ vars.LITELLM_API_PATH || '/chat/completions' }}
          LITELLM_MODEL: ${{ vars.LITELLM_MODEL || 'us.anthropic.claude-opus-4-7' }}
        run: |
          BASE_REF="${{ github.base_ref }}"
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          BASE_COMMIT="${BASE_SHA:-origin/${BASE_REF}}"
          HEAD_COMMIT="${HEAD_SHA:-HEAD}"

          if git merge-base "${BASE_COMMIT}" "${HEAD_COMMIT}" >/dev/null 2>&1; then
            export PR_COMMITS="$(git log --format=%B "${BASE_COMMIT}...${HEAD_COMMIT}")"
          else
            export PR_COMMITS="$(git log --format=%B "${HEAD_COMMIT}" -n 20)"
          fi

          node src/index.js \
            --diff pr.diff \
            --story-provider jira \
            --repo-root . \
            --max-context-files 700 \
            --llm-provider auto \
            --out review-report.md \
            --json review-report.json \
            --html review-dashboard.html \
            --fail-on medium

      - name: Upload review artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reviewiq-report
          path: |
            pr.diff
            review-report.md
            review-report.json
            review-dashboard.html

      - name: Post or update PR comment
        if: always() && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- reviewiq -->";
            const report = fs.existsSync("review-report.md")
              ? fs.readFileSync("review-report.md", "utf8")
              : "ReviewIQ did not produce a report. Check workflow logs.";
            const badge = "![ReviewIQ](https://img.shields.io/badge/ReviewIQ-AI%20Code%20Review-5B5FC7?style=for-the-badge)";
            const body = `${marker}\n${badge}\n\n${report}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number
            });
            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

      - name: Post inline review comments
        if: always() && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            if (!fs.existsSync("review-report.json") || !fs.existsSync("pr.diff")) {
              return;
            }
            const report = JSON.parse(fs.readFileSync("review-report.json", "utf8"));
            const diff = fs.readFileSync("pr.diff", "utf8");
            const changedLines = collectAddedLines(diff);
            const fallbackLines = await collectFallbackLines();
            const comments = [];
            const seen = new Set();
            for (const finding of report.findings ?? []) {
              if (!finding.file || shouldSkipInlineFinding(finding)) continue;
              const exactKey = Number.isInteger(finding.line) ? `${finding.file}:${finding.line}` : "";
              const exactLineMatch = changedLines.has(exactKey);
              const fallbackLine = fallbackLines.get(finding.file);
              const line = exactLineMatch ? finding.line : fallbackLine;
              if (!line) continue;
              const key = `${finding.file}:${line}`;
              if (seen.has(key)) continue;
              seen.add(key);
              comments.push({
                path: finding.file,
                line,
                side: "RIGHT",
                body: buildInlineBody(finding, comments.length + 1, line, exactLineMatch)
              });
              if (comments.length >= 20) break;
            }
            if (comments.length === 0) return;
            const { owner, repo } = context.repo;
            await github.rest.pulls.createReview({
              owner,
              repo,
              pull_number: context.issue.number,
              event: "COMMENT",
              body: `ReviewIQ posted ${comments.length} inline finding(s).`,
              comments
            });
            function shouldSkipInlineFinding(finding) {
              if (finding.id === "STATIC002") {
                return true;
              }
              return finding.category === "static" && isCommentOnlyLine(finding.details);
            }
            function isCommentOnlyLine(value) {
              const text = String(value ?? "").trim();
              return /^(\/\/|\/\*|\*|#|<!--|--|;)/.test(text);
            }
            function buildInlineBody(finding, sequence, reviewLine, exactLineMatch) {
              const severity = String(finding.severity ?? "low").toLowerCase();
              const title = plainTitle(finding);
              const observation = sentence(finding.details) || plainDetails(finding);
              const actual = plainDetails(finding);
              const recommendation = plainRecommendation(finding);
              const storyRef = report.metadata?.storyId ?? "Unknown story";
              const reviewedAt = report.metadata?.generatedAt ?? new Date().toISOString();
              const reviewId = `CR-${sanitizeReviewId(storyRef)}-${String(sequence).padStart(3, "0")}`;
              const acReference = acceptanceReference(finding, storyRef);
              return [
                `### ReviewIQ: ${title}`,
                "",
                `**${severityLabel(severity)}** · **${categoryLabel(finding.category)}** · \`${reviewId}\` · **Status:** Open`,
                "",
                `**Story:** ${storyRef}  `,
                `**File:** \`${finding.file}\`  `,
                `**Line:** ${lineRange(finding, reviewLine)}  `,
                `**Function:** ${methodName(finding)}`,
                "",
                "---",
                "",
                "#### What we found",
                observation,
                "",
                "#### What should happen",
                expectedBehaviour(finding),
                "",
                "#### What is happening now",
                actual,
                "",
                "#### How to fix",
                recommendation,
                suggestionBlock(finding, exactLineMatch),
                "",
                `**Jira / AC:** ${acReference}`,
                "",
                `_Reviewed by AI Review Assistant at ${reviewedAt}._`
              ].filter(Boolean).join("\n");
            }
            function suggestionBlock(finding, exactLineMatch) {
              if (!exactLineMatch || typeof finding.suggestedReplacement !== "string") {
                return "";
              }
              const replacement = finding.suggestedReplacement.replace(/```/g, "'''");
              return [
                "**Suggested code change:**",
                "```suggestion",
                replacement,
                "```"
              ].join("\n");
            }
            function sanitizeReviewId(value) {
              return String(value ?? "UNKNOWN").replace(/[^A-Za-z0-9-]+/g, "-").replace(/^-+|-+$/g, "") || "UNKNOWN";
            }
            function severityLabel(severity) {
              const labels = {
                critical: "Critical",
                high: "High",
                medium: "Medium",
                low: "Low"
              };
              return labels[severity] ?? "Suggestion";
            }
            function categoryLabel(category) {
              const labels = {
                security: "Security",
                performance: "Performance",
                static: "Maintainability",
                traceability: "Logic",
                tests: "Logic"
              };
              return labels[String(category ?? "").toLowerCase()] ?? "Bug";
            }
            function lineRange(finding, reviewLine) {
              const start = Number.isInteger(finding.line) ? finding.line : reviewLine;
              const end = Number.isInteger(finding.endLine) && finding.endLine > start ? finding.endLine : start;
              return start === end ? String(start) : `${start}-${end}`;
            }
            function methodName(finding) {
              return finding.method ?? finding.functionName ?? "Not sure from this diff";
            }
            function expectedBehaviour(finding) {
              if (finding.category === "security") {
                return "Secrets, customer data, and unsafe input should not be exposed.";
              }
              if (finding.category === "performance") {
                return "The change should not make user-facing code slower.";
              }
              if (finding.category === "static") {
                return "The code should be easy to read and safe to run in production.";
              }
              if (finding.category === "tests") {
                return "If Jira asks for tests, the PR should include them.";
              }
              return "The code should match the Jira story and ACs.";
            }
            function acceptanceReference(finding, storyRef) {
              const text = [finding.title, finding.details, finding.recommendation].filter(Boolean).join(" ");
              const match = text.match(/\bAC\s*#?\s*(\d+)\b|\b(AC\d+)\b/i);
              if (match) {
                return `${storyRef} — ${match[2] ?? `AC #${match[1]}`}`;
              }
              return `${storyRef} — ReviewIQ rule ${finding.id ?? "N/A"}`;
            }
            function plainTitle(finding) {
              const titles = {
                STATIC001: "Remove this debug log.",
                STATIC003: "This line is hard to read.",
                STATIC004: "This error is ignored.",
                SEC001: "This looks like a secret in the code.",
                SEC002: "This runs generated code.",
                SEC003: "This may show unsafe HTML.",
                SEC004: "This database query may be unsafe.",
                SEC005: "This may write sensitive data to logs.",
                SEC007: "This security rule needs a closer check.",
                PERF003: "This database query may fetch more data than needed.",
                PERF004: "This may block the app while it is running.",
                PERF001: "This waits inside a loop and may be slow.",
                PERF002: "This nested loop may become slow with more data."
              };
              return titles[finding.id] ?? sentence(finding.title) ?? "Please review this change.";
            }
            function plainDetails(finding) {
              const details = {
                STATIC001: "Debug logs can expose data and make production logs noisy.",
                STATIC003: "Long lines are easy to miss during review and harder to maintain later.",
                STATIC004: "If this fails in production, the app may hide the problem instead of handling it.",
                SEC001: "Secrets committed to git can be copied by anyone with repository access.",
                SEC002: "Generated code can run things we did not expect.",
                SEC003: "Unsafe HTML can let one user show harmful content to another user.",
                SEC004: "Building SQL with raw text can allow a user to change the query.",
                SEC005: "Logs are often shared. Passwords, tokens, cards, and raw payloads should not be logged.",
                PERF003: "Fetching every column can slow the query and expose data this flow does not need.",
                PERF004: "Blocking work can make requests slower for users."
              };
              return details[finding.id] ?? sentence(finding.details);
            }
            function plainRecommendation(finding) {
              const recommendation = {
                STATIC001: "Remove it. If the log is needed, make sure it is safe for production.",
                STATIC003: "Split it into smaller pieces so reviewers can understand it quickly.",
                STATIC004: "Handle the error, throw it again, or explain why it is safe to ignore.",
                SEC001: "Remove the value from code, rotate it, and read it from a secret manager.",
                SEC002: "Use a safer approach that does not run generated code.",
                SEC003: "Use safe rendering, or sanitize trusted HTML before rendering it.",
                SEC004: "Use parameterized queries instead of string concatenation.",
                SEC005: "Remove the sensitive value from the log or mask it before logging.",
                PERF003: "Select only the columns this flow needs.",
                PERF004: "Use the async/non-blocking version in request or hot paths."
              };
              return recommendation[finding.id] ?? sentence(finding.recommendation);
            }
            function sentence(value) {
              const text = String(value ?? "").replace(/\s+/g, " ").trim();
              if (!text) {
                return "";
              }
              return text.endsWith(".") ? text : `${text}.`;
            }
            function collectAddedLines(diffText) {
              const added = new Set();
              let currentFile = "";
              let newLine = 0;
              for (const line of diffText.split(/\r?\n/)) {
                const fileMatch = line.match(/^\+\+\+ b\/(.+)$/);
                if (fileMatch) {
                  currentFile = fileMatch[1];
                  continue;
                }
                const hunkMatch = line.match(/^@@ -\d+(?:,\d+)? \+(\d+)(?:,\d+)? @@/);
                if (hunkMatch) {
                  newLine = Number(hunkMatch[1]);
                  continue;
                }
                if (!currentFile || line.startsWith("+++") || line.startsWith("---")) continue;
                if (line.startsWith("+")) {
                  added.add(`${currentFile}:${newLine}`);
                  newLine += 1;
                } else if (line.startsWith("-")) {
                  continue;
                } else if (!line.startsWith("\\")) {
                  newLine += 1;
                }
              }
              return added;
            }
            async function collectFallbackLines() {
              const fallback = new Map();
              const { owner, repo } = context.repo;
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner,
                repo,
                pull_number: context.issue.number
              });
              for (const file of files) {
                const line = firstAddedLine(file.patch);
                if (line) fallback.set(file.filename, line);
              }
              return fallback;
            }
            function firstAddedLine(patch) {
              if (!patch) return undefined;
              let newLine = 0;
              for (const line of patch.split(/\r?\n/)) {
                const hunkMatch = line.match(/^@@ -\d+(?:,\d+)? \+(\d+)(?:,\d+)? @@/);
                if (hunkMatch) {
                  newLine = Number(hunkMatch[1]);
                  continue;
                }
                if (line.startsWith("+") && !line.startsWith("+++")) return newLine;
                if (!line.startsWith("-") && !line.startsWith("\\")) newLine += 1;
              }
              return undefined;
            }
