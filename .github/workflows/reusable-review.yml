name: Reusable ReviewIQ

on:
  workflow_call:
    inputs:
      stories-dir:
        description: Directory in the caller repository containing story JSON files.
        type: string
        default: stories
      story-provider:
        description: auto, json, or jira. auto uses Jira when configured and falls back to JSON.
        type: string
        default: auto
      fail-on:
        description: Severity threshold that fails the workflow. Use none, low, medium, high, or critical.
        type: string
        default: high
      max-context-files:
        description: Maximum number of caller repository files to scan for context.
        type: number
        default: 700
      llm-provider:
        description: none, auto, or litellm.
        type: string
        default: auto
      llm-required:
        description: Fail if LiteLLM is configured but the semantic review fails.
        type: boolean
        default: false
      litellm-base-url:
        description: LiteLLM gateway URL.
        type: string
        default: https://llmgw.codefest2026.marriott.com/
      litellm-api-path:
        description: LiteLLM chat completion API path.
        type: string
        default: /chat/completions
      litellm-model:
        description: LiteLLM model name.
        type: string
        default: us.anthropic.claude-opus-4-7
      jira-base-url:
        description: Jira base URL. Required for Jira provider.
        type: string
        default: ""
      jira-ac-field:
        description: Optional Jira custom field ID containing acceptance criteria, e.g. customfield_12345.
        type: string
        default: ""
      jira-api-version:
        description: Jira REST API version.
        type: string
        default: "3"
      reviewer-ref:
        description: Ref of the central reviewer repository to run.
        type: string
        default: main
    secrets:
      LITELLM_API_KEY:
        required: false
      JIRA_EMAIL:
        required: false
      JIRA_API_TOKEN:
        required: false
      JIRA_BEARER_TOKEN:
        required: false

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  context-review:
    name: ReviewIQ
    runs-on: ubuntu-latest

    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout reviewer engine
        uses: actions/checkout@v4
        with:
          repository: Sujan-DVSS/ai-context-pr-reviewer
          ref: ${{ inputs.reviewer-ref }}
          path: .ai-context-pr-reviewer

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate PR diff
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          git diff --unified=80 "origin/${{ github.base_ref }}...HEAD" > pr.diff

      - name: Run context reviewer
        env:
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          JIRA_BASE_URL: ${{ inputs.jira-base-url }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_BEARER_TOKEN: ${{ secrets.JIRA_BEARER_TOKEN }}
          JIRA_AC_FIELD: ${{ inputs.jira-ac-field }}
          JIRA_API_VERSION: ${{ inputs.jira-api-version }}
          LITELLM_BASE_URL: ${{ inputs.litellm-base-url }}
          LITELLM_API_PATH: ${{ inputs.litellm-api-path }}
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          LITELLM_MODEL: ${{ inputs.litellm-model }}
        run: |
          export PR_COMMITS="$(git log --format=%B "origin/${{ github.base_ref }}...HEAD")"
          LLM_REQUIRED_FLAG=""
          if [ "${{ inputs.llm-required }}" = "true" ]; then
            LLM_REQUIRED_FLAG="--llm-required"
          fi

          node .ai-context-pr-reviewer/src/index.js \
            --diff pr.diff \
            --story-provider "${{ inputs.story-provider }}" \
            --stories-dir "${{ inputs.stories-dir }}" \
            --repo-root . \
            --max-context-files "${{ inputs.max-context-files }}" \
            --llm-provider "${{ inputs.llm-provider }}" \
            --out review-report.md \
            --json review-report.json \
            --fail-on "${{ inputs.fail-on }}" \
            ${LLM_REQUIRED_FLAG}

      - name: Upload review artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reviewiq-report
          path: |
            pr.diff
            review-report.md
            review-report.json

      - name: Post or update PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- reviewiq -->";
            const report = fs.existsSync("review-report.md")
              ? fs.readFileSync("review-report.md", "utf8")
              : "ReviewIQ did not produce a report. Check workflow logs.";
            const badge = "![ReviewIQ](https://img.shields.io/badge/ReviewIQ-AI%20Code%20Review-5B5FC7?style=for-the-badge)";
            const body = `${marker}\n${badge}\n\n${report}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number
            });
            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

      - name: Post inline review comments
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            if (!fs.existsSync("review-report.json") || !fs.existsSync("pr.diff")) {
              core.info("Review report or diff not found; skipping inline comments.");
              return;
            }

            const report = JSON.parse(fs.readFileSync("review-report.json", "utf8"));
            const diff = fs.readFileSync("pr.diff", "utf8");
            const changedLines = collectAddedLines(diff);
            const fallbackLines = await collectFallbackLines();
            const comments = [];
            const seen = new Set();

            for (const finding of report.findings ?? []) {
              if (!finding.file) {
                continue;
              }
              const exactKey = Number.isInteger(finding.line) ? `${finding.file}:${finding.line}` : "";
              const fallbackLine = fallbackLines.get(finding.file);
              const line = changedLines.has(exactKey) ? finding.line : fallbackLine;
              if (!line) {
                continue;
              }
              const key = `${finding.file}:${line}`;
              if (seen.has(key)) {
                continue;
              }
              seen.add(key);
              comments.push({
                path: finding.file,
                line,
                side: "RIGHT",
                body: [
                  `**ReviewIQ: ${finding.severity?.toUpperCase() ?? "INFO"}**`,
                  "",
                  finding.title,
                  "",
                  finding.details ? `Details: ${finding.details}` : "",
                  finding.recommendation ? `Recommendation: ${finding.recommendation}` : ""
                ].filter(Boolean).join("\n")
              });
              if (comments.length >= 20) {
                break;
              }
            }

            if (comments.length === 0) {
              core.info("No findings mapped to changed diff lines; skipping inline comments.");
              return;
            }

            const { owner, repo } = context.repo;
            await github.rest.pulls.createReview({
              owner,
              repo,
              pull_number: context.issue.number,
              event: "COMMENT",
              body: `ReviewIQ posted ${comments.length} inline finding(s).`,
              comments
            });

            function collectAddedLines(diffText) {
              const added = new Set();
              let currentFile = "";
              let newLine = 0;
              for (const line of diffText.split(/\r?\n/)) {
                const fileMatch = line.match(/^\+\+\+ b\/(.+)$/);
                if (fileMatch) {
                  currentFile = fileMatch[1];
                  continue;
                }
                const hunkMatch = line.match(/^@@ -\d+(?:,\d+)? \+(\d+)(?:,\d+)? @@/);
                if (hunkMatch) {
                  newLine = Number(hunkMatch[1]);
                  continue;
                }
                if (!currentFile || line.startsWith("+++") || line.startsWith("---")) {
                  continue;
                }
                if (line.startsWith("+")) {
                  added.add(`${currentFile}:${newLine}`);
                  newLine += 1;
                } else if (line.startsWith("-")) {
                  continue;
                } else if (!line.startsWith("\\")) {
                  newLine += 1;
                }
              }
              return added;
            }

            async function collectFallbackLines() {
              const fallback = new Map();
              const { owner, repo } = context.repo;
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner,
                repo,
                pull_number: context.issue.number
              });
              for (const file of files) {
                const line = firstAddedLine(file.patch);
                if (line) {
                  fallback.set(file.filename, line);
                }
              }
              return fallback;
            }

            function firstAddedLine(patch) {
              if (!patch) {
                return undefined;
              }
              let newLine = 0;
              for (const line of patch.split(/\r?\n/)) {
                const hunkMatch = line.match(/^@@ -\d+(?:,\d+)? \+(\d+)(?:,\d+)? @@/);
                if (hunkMatch) {
                  newLine = Number(hunkMatch[1]);
                  continue;
                }
                if (line.startsWith("+") && !line.startsWith("+++")) {
                  return newLine;
                }
                if (!line.startsWith("-") && !line.startsWith("\\")) {
                  newLine += 1;
                }
              }
              return undefined;
            }
