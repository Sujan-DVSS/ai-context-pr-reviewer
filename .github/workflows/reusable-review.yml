name: Reusable ReviewIQ

on:
  workflow_call:
    inputs:
      stories-dir:
        description: Deprecated and ignored. Story context is loaded from Jira only.
        type: string
        default: ""
      story-provider:
        description: jira or auto. Story context is always loaded from Jira.
        type: string
        default: jira
      fail-on:
        description: Severity threshold that fails the workflow. Use none, low, medium, high, or critical.
        type: string
        default: medium
      max-context-files:
        description: Maximum number of caller repository files to scan for context.
        type: number
        default: 700
      llm-provider:
        description: none, auto, or litellm.
        type: string
        default: auto
      llm-required:
        description: Fail if LiteLLM is configured but the semantic review fails.
        type: boolean
        default: false
      litellm-base-url:
        description: LiteLLM gateway URL.
        type: string
        default: https://llmgw.codefest2026.marriott.com/
      litellm-api-path:
        description: LiteLLM chat completion API path.
        type: string
        default: /chat/completions
      litellm-model:
        description: LiteLLM model name.
        type: string
        default: us.anthropic.claude-opus-4-7
      jira-base-url:
        description: Jira base URL. Required for Jira provider.
        type: string
        default: ""
      jira-ac-field:
        description: Optional Jira custom field ID containing acceptance criteria, e.g. customfield_12345.
        type: string
        default: ""
      jira-api-version:
        description: Jira REST API version.
        type: string
        default: "3"
      reviewer-ref:
        description: Ref of the central reviewer repository to run.
        type: string
        default: main
      runner-label:
        description: Runner label to use. Use self-hosted if the LiteLLM gateway blocks GitHub-hosted runners.
        type: string
        default: ubuntu-latest
      ignore-label:
        description: PR label that skips ReviewIQ.
        type: string
        default: reviewiq-ignore
    secrets:
      LITELLM_API_KEY:
        required: false
      JIRA_EMAIL:
        required: false
      JIRA_API_TOKEN:
        required: false
      JIRA_BEARER_TOKEN:
        required: false

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  context-review:
    name: ReviewIQ
    runs-on: ${{ inputs.runner-label }}

    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout reviewer engine
        uses: actions/checkout@v4
        with:
          repository: Sujan-DVSS/ai-context-pr-reviewer
          ref: ${{ inputs.reviewer-ref }}
          path: .ai-context-pr-reviewer

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate PR diff
        run: |
          BASE_REF="${{ github.base_ref }}"
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          git fetch origin "${BASE_REF}" --no-tags --prune

          BASE_COMMIT="${BASE_SHA:-origin/${BASE_REF}}"
          HEAD_COMMIT="${HEAD_SHA:-HEAD}"

          if git merge-base "${BASE_COMMIT}" "${HEAD_COMMIT}" >/dev/null 2>&1; then
            git diff --unified=80 "${BASE_COMMIT}...${HEAD_COMMIT}" > pr.diff
          else
            echo "No merge base found between ${BASE_COMMIT} and ${HEAD_COMMIT}; using direct tree diff."
            git diff --unified=80 "${BASE_COMMIT}" "${HEAD_COMMIT}" > pr.diff
          fi

      - name: Check ReviewIQ ignore
        id: reviewiq-ignore
        uses: actions/github-script@v7
        env:
          REVIEWIQ_IGNORE_LABEL: ${{ inputs.ignore-label }}
        with:
          script: |
            const ignoreLabel = (process.env.REVIEWIQ_IGNORE_LABEL || "reviewiq-ignore").toLowerCase();
            const labels = (context.payload.pull_request?.labels ?? []).map((label) => label.name.toLowerCase());
            const body = context.payload.pull_request?.body ?? "";
            const labelMatch = labels.includes(ignoreLabel);
            const bodyMatch = /\[(reviewiq ignore|skip reviewiq)\]/i.test(body);
            const ignored = labelMatch || bodyMatch;
            const reason = labelMatch
              ? `PR has label "${ignoreLabel}".`
              : bodyMatch
                ? "PR body contains [reviewiq ignore] or [skip reviewiq]."
                : "";
            core.setOutput("ignored", ignored ? "true" : "false");
            core.setOutput("reason", reason);

      - name: Create skipped ReviewIQ report
        if: steps.reviewiq-ignore.outputs.ignored == 'true'
        env:
          REVIEWIQ_IGNORE_REASON: ${{ steps.reviewiq-ignore.outputs.reason }}
          REVIEWIQ_IGNORE_LABEL: ${{ inputs.ignore-label }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const reason = process.env.REVIEWIQ_IGNORE_REASON || "Reviewer requested ReviewIQ skip.";
          const label = process.env.REVIEWIQ_IGNORE_LABEL || "reviewiq-ignore";
          const generatedAt = new Date().toISOString();
          const markdown = [
            "# ReviewIQ",
            "",
            "**Gate:** PASS | **Status:** skipped",
            "",
            "ReviewIQ was skipped by reviewer request.",
            "",
            `**Reason:** ${reason}`,
            "",
            `To run ReviewIQ again, remove the \`${label}\` label and remove \`[reviewiq ignore]\` or \`[skip reviewiq]\` from the PR body.`,
            "",
            "_Generated by ReviewIQ._",
            ""
          ].join("\n");
          const report = {
            metadata: {
              generatedAt,
              gate: "pass",
              status: "skipped",
              ignored: true,
              ignoreReason: reason,
              maxSeverity: "none",
              changedFiles: 0,
              additions: 0,
              deletions: 0
            },
            files: [],
            acceptanceCriteria: [],
            findings: [],
            findingCounts: {},
            reviewerQuestions: []
          };
          const html = `<!doctype html><html lang="en"><head><meta charset="utf-8"><title>ReviewIQ Skipped</title></head><body><h1>ReviewIQ skipped</h1><p>${reason}</p></body></html>\n`;
          fs.writeFileSync("review-report.md", markdown);
          fs.writeFileSync("review-report.json", `${JSON.stringify(report, null, 2)}\n`);
          fs.writeFileSync("review-dashboard.html", html);
          NODE

      - name: Clear previous ReviewIQ inline comments
        if: steps.reviewiq-ignore.outputs.ignored == 'true' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.issue.number;
            const comments = await github.paginate(github.rest.pulls.listReviewComments, {
              owner,
              repo,
              pull_number
            });
            for (const comment of comments) {
              const isReviewIq = comment.user?.type === "Bot" && comment.body?.includes("ReviewIQ:");
              if (!isReviewIq) continue;
              try {
                await github.rest.pulls.deleteReviewComment({
                  owner,
                  repo,
                  comment_id: comment.id
                });
              } catch (error) {
                core.warning(`Could not delete ReviewIQ inline comment ${comment.id}: ${error.message}`);
              }
            }

      - name: Run context reviewer
        if: steps.reviewiq-ignore.outputs.ignored != 'true'
        env:
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          JIRA_BASE_URL: ${{ inputs.jira-base-url }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_BEARER_TOKEN: ${{ secrets.JIRA_BEARER_TOKEN }}
          JIRA_AC_FIELD: ${{ inputs.jira-ac-field }}
          JIRA_API_VERSION: ${{ inputs.jira-api-version }}
          LITELLM_BASE_URL: ${{ inputs.litellm-base-url }}
          LITELLM_API_PATH: ${{ inputs.litellm-api-path }}
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          LITELLM_MODEL: ${{ inputs.litellm-model }}
        run: |
          BASE_REF="${{ github.base_ref }}"
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          BASE_COMMIT="${BASE_SHA:-origin/${BASE_REF}}"
          HEAD_COMMIT="${HEAD_SHA:-HEAD}"

          if git merge-base "${BASE_COMMIT}" "${HEAD_COMMIT}" >/dev/null 2>&1; then
            export PR_COMMITS="$(git log --format=%B "${BASE_COMMIT}...${HEAD_COMMIT}")"
          else
            export PR_COMMITS="$(git log --format=%B "${HEAD_COMMIT}" -n 20)"
          fi

          LLM_REQUIRED_FLAG=""
          if [ "${{ inputs.llm-required }}" = "true" ]; then
            LLM_REQUIRED_FLAG="--llm-required"
          fi

          node .ai-context-pr-reviewer/src/index.js \
            --diff pr.diff \
            --story-provider "${{ inputs.story-provider }}" \
            --repo-root . \
            --max-context-files "${{ inputs.max-context-files }}" \
            --llm-provider "${{ inputs.llm-provider }}" \
            --out review-report.md \
            --json review-report.json \
            --html review-dashboard.html \
            --fail-on "${{ inputs.fail-on }}" \
            ${LLM_REQUIRED_FLAG}

      - name: Upload review artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reviewiq-report
          path: |
            pr.diff
            review-report.md
            review-report.json
            review-dashboard.html

      - name: Post or update PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- reviewiq -->";
            const report = fs.existsSync("review-report.md")
              ? fs.readFileSync("review-report.md", "utf8")
              : "ReviewIQ did not produce a report. Check workflow logs.";
            const badge = "![ReviewIQ](https://img.shields.io/badge/ReviewIQ-AI%20Code%20Review-5B5FC7?style=for-the-badge)";
            const body = `${marker}\n${badge}\n\n${report}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number
            });
            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

      - name: Post inline review comments
        if: always() && steps.reviewiq-ignore.outputs.ignored != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            if (!fs.existsSync("review-report.json") || !fs.existsSync("pr.diff")) {
              core.info("Review report or diff not found; skipping inline comments.");
              return;
            }

            const report = JSON.parse(fs.readFileSync("review-report.json", "utf8"));
            const diff = fs.readFileSync("pr.diff", "utf8");
            const changedLines = collectAddedLines(diff);
            const fallbackLines = await collectFallbackLines();
            const comments = [];
            const seen = new Set();

            for (const finding of report.findings ?? []) {
              if (shouldSkipInlineFinding(finding)) {
                continue;
              }
              const targetFile = finding.file ?? fallbackLines.keys().next().value;
              if (!targetFile) {
                continue;
              }
              const displayFinding = { ...finding, file: targetFile };
              const exactKey = Number.isInteger(finding.line) ? `${targetFile}:${finding.line}` : "";
              const exactLineMatch = changedLines.has(exactKey);
              const fallbackLine = fallbackLines.get(targetFile);
              const line = exactLineMatch ? finding.line : fallbackLine;
              if (!line) {
                continue;
              }
              const key = `${targetFile}:${line}`;
              if (seen.has(key)) {
                continue;
              }
              seen.add(key);
              comments.push({
                path: targetFile,
                line,
                side: "RIGHT",
                body: buildInlineBody(displayFinding, comments.length + 1, line, exactLineMatch)
              });
              if (comments.length >= 20) {
                break;
              }
            }

            if (comments.length === 0) {
              core.info("No findings mapped to changed diff lines; skipping inline comments.");
              return;
            }

            const { owner, repo } = context.repo;
            await github.rest.pulls.createReview({
              owner,
              repo,
              pull_number: context.issue.number,
              event: "COMMENT",
              body: `ReviewIQ posted ${comments.length} inline finding(s).`,
              comments
            });

            function shouldSkipInlineFinding(finding) {
              if (finding.id === "STATIC002") {
                return true;
              }
              return finding.category === "static" && isCommentOnlyLine(finding.details);
            }

            function isCommentOnlyLine(value) {
              const text = String(value ?? "").trim();
              return /^(\/\/|\/\*|\*|#|<!--|--|;)/.test(text);
            }

            function buildInlineBody(finding, sequence, reviewLine, exactLineMatch) {
              const severity = String(finding.severity ?? "low").toLowerCase();
              const title = plainTitle(finding);
              const observation = shorten(sentence(finding.details) || plainDetails(finding), 420);
              const recommendation = shorten(plainRecommendation(finding), 320);
              const storyRef = report.metadata?.storyId ?? "Unknown story";
              const reviewedAt = report.metadata?.generatedAt ?? new Date().toISOString();
              const reviewId = `CR-${sanitizeReviewId(storyRef)}-${String(sequence).padStart(3, "0")}`;
              const acReference = acceptanceReference(finding, storyRef);
              const functionName = methodName(finding);
              const expected = specificExpected(finding);
              const location = [
                `**Jira / AC:** ${acReference}`,
                `**File:** \`${finding.file}\``,
                `**Line:** ${lineRange(finding, reviewLine)}`,
                functionName ? `**Function:** ${functionName}` : ""
              ].filter(Boolean).join("  \n");
              return [
                `### ReviewIQ: ${title}`,
                "",
                `**${severityLabel(severity)}** · **${categoryLabel(finding.category)}** · \`${reviewId}\` · **Open**`,
                "",
                location,
                "",
                "---",
                "",
                "**Problem**",
                observation,
                ...(expected ? ["", "**Expected**", expected] : []),
                "",
                "**Fix**",
                recommendation,
                suggestionBlock(finding, exactLineMatch),
                "",
                `<sub>Reviewed by AI Review Assistant at ${reviewedAt}</sub>`
              ].filter(Boolean).join("\n");
            }

            function suggestionBlock(finding, exactLineMatch) {
              if (!exactLineMatch || typeof finding.suggestedReplacement !== "string") {
                return "";
              }
              const replacement = finding.suggestedReplacement.replace(/```/g, "'''");
              return [
                "**Suggested code change:**",
                "```suggestion",
                replacement,
                "```"
              ].join("\n");
            }

            function sanitizeReviewId(value) {
              return String(value ?? "UNKNOWN").replace(/[^A-Za-z0-9-]+/g, "-").replace(/^-+|-+$/g, "") || "UNKNOWN";
            }

            function severityLabel(severity) {
              const labels = {
                critical: "Critical",
                high: "High",
                medium: "Medium",
                low: "Low"
              };
              return labels[severity] ?? "Suggestion";
            }

            function categoryLabel(category) {
              const labels = {
                security: "Security",
                performance: "Performance",
                static: "Maintainability",
                traceability: "Logic",
                tests: "Logic"
              };
              return labels[String(category ?? "").toLowerCase()] ?? "Bug";
            }

            function lineRange(finding, reviewLine) {
              const start = Number.isInteger(finding.line) ? finding.line : reviewLine;
              const end = Number.isInteger(finding.endLine) && finding.endLine > start ? finding.endLine : start;
              return start === end ? String(start) : `${start}-${end}`;
            }

            function methodName(finding) {
              return finding.method ?? finding.functionName ?? "";
            }

            function expectedBehaviour(finding) {
              if (finding.category === "security") {
                return "Secrets, customer data, and unsafe input should not be exposed.";
              }
              if (finding.category === "performance") {
                return "The change should not make user-facing code slower.";
              }
              if (finding.category === "static") {
                return "The code should be easy to read and safe to run in production.";
              }
              if (finding.category === "tests") {
                return "If Jira asks for tests, the PR should include them.";
              }
              return "The code should match the Jira story and ACs.";
            }

            function specificExpected(finding) {
              const text = [finding.title, finding.details, finding.recommendation].filter(Boolean).join(" ");
              const acMatch = text.match(/AC\s*#?\s*(\d+)[^.!?]*(?:should|must|requires?|expected|not|when|if)[^.!?]*/i);
              if (acMatch) {
                return sentence(acMatch[0]);
              }
              const quoted = text.match(/["“]([^"”]{20,180})["”]/);
              if (quoted) {
                return sentence(quoted[1]);
              }
              if (finding.category === "security" || finding.category === "performance" || finding.category === "tests") {
                return expectedBehaviour(finding);
              }
              return "";
            }

            function acceptanceReference(finding, storyRef) {
              const text = [finding.title, finding.details, finding.recommendation].filter(Boolean).join(" ");
              const match = text.match(/\bAC\s*#?\s*(\d+)\b|\b(AC\d+)\b/i);
              if (match) {
                return `${storyRef} — ${match[2] ?? `AC #${match[1]}`}`;
              }
              return `${storyRef} — ReviewIQ rule ${finding.id ?? "N/A"}`;
            }

            function plainTitle(finding) {
              const titles = {
                STATIC001: "Remove this debug log.",
                STATIC003: "This line is hard to read.",
                STATIC004: "This error is ignored.",
                SEC001: "This looks like a secret in the code.",
                SEC002: "This runs generated code.",
                SEC003: "This may show unsafe HTML.",
                SEC004: "This database query may be unsafe.",
                SEC005: "This may write sensitive data to logs.",
                SEC007: "This security rule needs a closer check.",
                PERF003: "This database query may fetch more data than needed.",
                PERF004: "This may block the app while it is running.",
                PERF001: "This waits inside a loop and may be slow.",
                PERF002: "This nested loop may become slow with more data."
              };
              return titles[finding.id] ?? sentence(finding.title) ?? "Please review this change.";
            }

            function plainDetails(finding) {
              const details = {
                STATIC001: "Debug logs can expose data and make production logs noisy.",
                STATIC003: "Long lines are easy to miss during review and harder to maintain later.",
                STATIC004: "If this fails in production, the app may hide the problem instead of handling it.",
                SEC001: "Secrets committed to git can be copied by anyone with repository access.",
                SEC002: "Generated code can run things we did not expect.",
                SEC003: "Unsafe HTML can let one user show harmful content to another user.",
                SEC004: "Building SQL with raw text can allow a user to change the query.",
                SEC005: "Logs are often shared. Passwords, tokens, cards, and raw payloads should not be logged.",
                PERF003: "Fetching every column can slow the query and expose data this flow does not need.",
                PERF004: "Blocking work can make requests slower for users."
              };
              return details[finding.id] ?? sentence(finding.details);
            }

            function plainRecommendation(finding) {
              const recommendation = {
                STATIC001: "Remove it. If the log is needed, make sure it is safe for production.",
                STATIC003: "Split it into smaller pieces so reviewers can understand it quickly.",
                STATIC004: "Handle the error, throw it again, or explain why it is safe to ignore.",
                SEC001: "Remove the value from code, rotate it, and read it from a secret manager.",
                SEC002: "Use a safer approach that does not run generated code.",
                SEC003: "Use safe rendering, or sanitize trusted HTML before rendering it.",
                SEC004: "Use parameterized queries instead of string concatenation.",
                SEC005: "Remove the sensitive value from the log or mask it before logging.",
                PERF003: "Select only the columns this flow needs.",
                PERF004: "Use the async/non-blocking version in request or hot paths."
              };
              return recommendation[finding.id] ?? sentence(finding.recommendation);
            }

            function sentence(value) {
              const text = String(value ?? "").replace(/\s+/g, " ").trim();
              if (!text) {
                return "";
              }
              return text.endsWith(".") ? text : `${text}.`;
            }

            function shorten(value, maxLength) {
              const text = sentence(value);
              return text.length <= maxLength ? text : `${text.slice(0, maxLength - 1).trim()}...`;
            }

            function collectAddedLines(diffText) {
              const added = new Set();
              let currentFile = "";
              let newLine = 0;
              for (const line of diffText.split(/\r?\n/)) {
                const fileMatch = line.match(/^\+\+\+ b\/(.+)$/);
                if (fileMatch) {
                  currentFile = fileMatch[1];
                  continue;
                }
                const hunkMatch = line.match(/^@@ -\d+(?:,\d+)? \+(\d+)(?:,\d+)? @@/);
                if (hunkMatch) {
                  newLine = Number(hunkMatch[1]);
                  continue;
                }
                if (!currentFile || line.startsWith("+++") || line.startsWith("---")) {
                  continue;
                }
                if (line.startsWith("+")) {
                  added.add(`${currentFile}:${newLine}`);
                  newLine += 1;
                } else if (line.startsWith("-")) {
                  continue;
                } else if (!line.startsWith("\\")) {
                  newLine += 1;
                }
              }
              return added;
            }

            async function collectFallbackLines() {
              const fallback = new Map();
              const { owner, repo } = context.repo;
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner,
                repo,
                pull_number: context.issue.number
              });
              for (const file of files) {
                const line = firstAddedLine(file.patch);
                if (line) {
                  fallback.set(file.filename, line);
                }
              }
              return fallback;
            }

            function firstAddedLine(patch) {
              if (!patch) {
                return undefined;
              }
              let newLine = 0;
              for (const line of patch.split(/\r?\n/)) {
                const hunkMatch = line.match(/^@@ -\d+(?:,\d+)? \+(\d+)(?:,\d+)? @@/);
                if (hunkMatch) {
                  newLine = Number(hunkMatch[1]);
                  continue;
                }
                if (line.startsWith("+") && !line.startsWith("+++")) {
                  return newLine;
                }
                if (!line.startsWith("-") && !line.startsWith("\\")) {
                  newLine += 1;
                }
              }
              return undefined;
            }
